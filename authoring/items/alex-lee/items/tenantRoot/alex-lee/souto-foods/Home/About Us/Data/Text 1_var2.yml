        <div class="ck-content"><h3 style="color:#1a1a1a;font-family:'Arial Black', Arial, sans-serif;font-size:1.1rem;letter-spacing:0.08em;line-height:1.3;margin:0 0 16px;text-transform:uppercase;"><strong>Impulsado Por La Pasión</strong></h3><p style="color:#444444;font-family:Arial, sans-serif;font-size:0.95rem;font-weight:400;line-height:1.75;margin:0;">La pasión es el hilo común en todo lo que hacemos, un ingrediente esencial en nuestra búsqueda por mantener las tradiciones latinas, alimentar y enriquecer comunidades, y servir y hacer crecer los negocios de nuestros clientes. En 2017, cuando Alex Lee adquirió Souto Foods, pudimos hacer crecer nuestro negocio y avanzar en nuestra misión a una escala aún mayor. Hoy, te traemos la pasión y energía de una empresa joven junto con más de 90 años de experiencia en la industria de comestibles al por mayor de Alex Lee y nuestra empresa hermana, MDI.</p></div>
