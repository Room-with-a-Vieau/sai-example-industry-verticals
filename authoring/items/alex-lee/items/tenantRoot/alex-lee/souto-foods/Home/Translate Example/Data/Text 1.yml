        <div class="ck-content"><h3 style="color:#1a1a1a;font-family:'Arial Black', Arial, sans-serif;font-size:1.1rem;letter-spacing:0.08em;line-height:1.3;margin:0 0 16px;text-transform:uppercase;"><strong>Con Propósito</strong></h3><p style="color:#444444;font-family:Arial, sans-serif;font-size:0.95rem;font-weight:400;line-height:1.75;margin:0;">Cuando Sebastián Souto fundó Souto Foods en Atlanta, Georgia, en 2010, su misión era ofrecer a los clientes productos de la más alta calidad de América Latina y el Caribe, junto con el mejor servicio en la industria. Al mantenerse fiel a este propósito, Souto Foods se convirtió en una de las empresas privadas de más rápido crecimiento en los Estados Unidos y expandió su alcance y capacidades. Todo el equipo de Souto Foods continúa tomando esta misión personalmente.&nbsp;</p><p style="color:#444444;font-family:Arial, sans-serif;font-size:0.95rem;font-weight:400;line-height:1.75;margin:0;">&nbsp;</p><h3 style="color:#1a1a1a;font-family:'Arial Black', Arial, sans-serif;font-size:1.1rem;letter-spacing:0.08em;line-height:1.3;margin:0 0 16px;text-transform:uppercase;"><strong>Impulsado Por La Pasión</strong></h3><p style="color:#444444;font-family:Arial, sans-serif;font-size:0.95rem;font-weight:400;line-height:1.75;margin:0;">La pasión es el hilo común en todo lo que hacemos, un ingrediente esencial en nuestra búsqueda por mantener las tradiciones latinas, alimentar y enriquecer comunidades, y servir y hacer crecer los negocios de nuestros clientes. En 2017, cuando Alex Lee adquirió Souto Foods, pudimos hacer crecer nuestro negocio y avanzar en nuestra misión a una escala aún mayor. Hoy, te traemos la pasión y energía de una empresa joven junto con más de 90 años de experiencia en la industria de comestibles al por mayor de Alex Lee y nuestra empresa hermana, MDI.</p><p style="color:#444444;font-family:Arial, sans-serif;font-size:0.95rem;font-weight:400;line-height:1.75;margin:0;">&nbsp;</p><h3 style="color:#1a1a1a;font-family:'Arial Black', Arial, sans-serif;font-size:1.1rem;letter-spacing:0.08em;line-height:1.3;margin:0 0 16px;text-transform:uppercase;"><strong>Impulsado por la Colaboración</strong></h3><p style="color:#444444;font-family:Arial, sans-serif;font-size:0.95rem;font-weight:400;line-height:1.75;margin:0;">Souto Foods trabaja mano a mano con su empresa hermana, Merchants Distributors, LLC (MDI). Al asociarnos con MDI, hemos ampliado nuestro alcance, capacidades y poder de compra. Hemos cultivado un extenso portafolio de productos y ahora ofrecemos servicios expertos de comercialización, marketing y tecnología digital. Cuando te asocias con Souto Foods, obtienes el apoyo y la experiencia de un equipo extenso que está listo para servirte con excelencia.&nbsp;</p><p style="color:#444444;font-family:Arial, sans-serif;font-size:0.95rem;font-weight:400;line-height:1.75;margin:0;">&nbsp;</p></div>
