    - ID: "adeeaa1d-7479-49cf-b855-c67e641c6e0d"
      Hint: Content
      Value: "<p>For 90 years, we have supported independent grocers with essential expertise, infrastructure and scale, so that they can thrive and grow.</p><p>Who is MDI? We're a time-tested, success-driven wholesale grocery distributor that services retailers across the East Coast. Let's partner up, roll up our sleeves, and get the job done.</p><h2>Big League Support For The Hometown Team</h2><p>You created your business, attracted your market, and are an integral part of your community. We will help you uncover compelling ways to build on your strengths, maximize your sales, and streamline your operations. MDI provides the scale and infrastructure you need to compete against big chains. We have the proven expertise to help you adapt to an ever-changing market, so you can focus on what matters most: serving your community.</p><h2>What We Offer</h2><p>We deliver over 40,000 products across multiple categories and price points. Our extensive in-house range of products includes organic and sought-after specialty items, profitable high-end offerings, local treasures and a wide range of authentic ethnic products.</p><p>From Ecommerce to Retail Operations, we get you moving in the right direction so that you don't just keep up, but keep ahead.</p><p>MDI supplies full logistics support with a vast array of warehousing and distribution services. We specialize in assisting manufacturers and suppliers with the shipment of products to retail using the latest technology. As leaders in high-quality food safe technology and monitoring, you get longer shelf life, fresh to the table food, an iron-clad reputation and happy returning customers.</p><h2>How We Compare</h2><p><strong>Service:</strong> We are committed to providing unrivaled service and comprehensive support to help your business thrive.</p><p><strong>Forward-Thinking:</strong> We co-create with you for your future. We dare to think differently. And we never settle for business as usual.</p><p><strong>Integrity:</strong> Our relationships are built on trust and respect. We know we provide a service that is critical to communities, and we take our responsibility seriously. That is why our word is our bond and we strive to earn your business every day.</p><p><strong>Flexibility:</strong> Being independently-owned with in-house products and services helps us to help you stay in control and adapt to a changing environment.</p><p><strong>Transparency:</strong> We offer a clear and simple fee structure with no hidden costs.</p><p><strong>Private Brands:</strong> We offer a complete private brands program to provide your customers the variety and value they want.</p><p><strong>Total Latino Solution:</strong> We offer a comprehensive program for authentic Latino offerings.</p><p>As you evolve, your business does, too. We're here to give you the continual support you need for unhindered, effortless growth.</p>"
