        <div class="ck-content"><div style="max-width:500px;padding:20px 0;"><h3 style="color:#1a1a1a;font-family:'Arial Black', Arial, sans-serif;font-size:1.1rem;letter-spacing:0.08em;line-height:1.3;margin:0 0 16px;text-transform:uppercase;"><strong>Grounded in Purpose</strong></h3><p style="color:#444444;font-family:Arial, sans-serif;font-size:0.95rem;font-weight:400;line-height:1.75;margin:0;">When Sebastian Souto founded Souto Foods in Atlanta, Georgia, in 2010, his mission was to provide customers with the highest-quality products from Latin America and the Caribbean, along with the best service in the industry. By staying loyal to this purpose, Souto Foods became one of the fastest growing private companies in the United States and expanded its reach and capabilities. The entire team at Souto Foods continues to take this mission personally.&nbsp;</p></div></div>
