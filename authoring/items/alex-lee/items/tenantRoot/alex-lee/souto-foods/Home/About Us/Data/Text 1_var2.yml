        <div class="ck-content"><h3 style="color:#1a1a1a;font-family:'Arial Black', Arial, sans-serif;font-size:1.1rem;letter-spacing:0.08em;line-height:1.3;margin:0 0 16px;text-transform:uppercase;"><strong>Fueled By Passion</strong></h3><p style="color:#444444;font-family:Arial, sans-serif;font-size:0.95rem;font-weight:400;line-height:1.75;margin:0;">Passion is the common thread in everything we do – an essential ingredient in our pursuit to uphold Latin traditions, feed and enrich communities, and serve and grow our customers’ businesses. In 2017 when Alex Lee acquired Souto Foods, we were able to grow our business and further our mission on an even larger scale. Today, we bring you the passion and energy of a young company along with over 90 years of experience in the wholesale grocery industry from Alex Lee and our sister company, MDI.</p></div>
